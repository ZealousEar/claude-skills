# Grapple Law Analytics Lenses — 15 lenses in 4 tiers
# Each lens targets a specific analytical question about the Grapple funnel.
# Applied one per iteration; recency-based avoidance prevents repeats.

lenses:
  # === TIER 1: STRUCTURAL (Lenses 1-4) ===
  # Core funnel mechanics — run these first

  - id: funnel_mechanics
    name: "Funnel Mechanics"
    prompt: "Calculate stage-by-stage conversion rates through all 9 funnel stages. For each stage transition, compute the absolute count and percentage that advance. Identify the single biggest drop-off point. Compare conversion rates for the most recent 30 days vs the prior 60 days to detect trends."

  - id: paywall_boundary
    name: "Paywall Boundary"
    prompt: "Investigate the free message limit boundary. Compare message count distributions for users who converted (have users_subscriptions) vs users who dropped off. What is the distribution of messages_sent_today_count when is_max_free_messages_count_reached becomes true? Is there a 'magic number' of messages that predicts conversion?"

  - id: case_score_effect
    name: "Case Score Effect"
    prompt: "Analyze the relationship between case scoring events and conversion. Users who receive a case score (system_type messages) — how do their conversion rates compare to users who don't? How quickly after case scoring do users select a plan? What percentage of case-scored users convert within 1 day, 3 days, 7 days?"

  - id: time_to_value
    name: "Time to Value"
    prompt: "Measure the speed from registration to key milestones: first message, 5th message, case score, plan selection. For users who ultimately convert, what does their timeline look like vs users who drop off? Is faster time-to-value correlated with conversion? Compute median and p75 times."

  # === TIER 2: BEHAVIORAL (Lenses 5-8) ===
  # User behavior patterns that predict outcomes

  - id: engagement_velocity
    name: "Engagement Velocity"
    prompt: "Measure message velocity — messages per hour in the first 24 hours and first 7 days. Do users who send messages in rapid bursts convert at different rates than those who spread messages over days? Segment by outcome (converted, dropped at paywall, dropped before paywall)."

  - id: return_patterns
    name: "Return Patterns"
    prompt: "Analyze multi-session behavior. How many sessions does the typical user create? What is the time gap between sessions? Do users who return within 7 days convert at higher rates? Identify the return-visit pattern that best predicts conversion (e.g., 2+ sessions within first week)."

  - id: dropoff_forensics
    name: "Drop-off Forensics"
    prompt: "Investigate the last actions before users abandon the platform. What is the most common last system_type message before drop-off? Do users who hit thread_locked_at ever return? What percentage of users with is_max_free_messages_count_reached=true never come back? Compute the 'point of no return' in the funnel."

  - id: power_user_anatomy
    name: "Power User Anatomy"
    prompt: "Profile the users who reach the deepest funnel stages (agreement signed, first letter sent). How do they differ from average users in: total messages, sessions created, time on platform, documents uploaded (users_media), emails sent? Build a profile of the ideal converting user."

  # === TIER 3: EXPLORATORY (Lenses 9-12) ===
  # Broader patterns and segmentation

  - id: temporal_patterns
    name: "Temporal Patterns"
    prompt: "Analyze time-based patterns in user engagement. What hours of day and days of week show highest registration, highest message volume, and highest conversion rates? Is there a 'golden hour' when users are most likely to convert? Compare weekday vs weekend behavior."

  - id: cohort_drift
    name: "Cohort Drift"
    prompt: "Group users by signup week and compare cohort-level metrics: 7-day activation rate, 30-day conversion rate, average messages per user. Are recent cohorts converting better or worse than early cohorts? Identify any cohort that significantly outperformed or underperformed."

  - id: subscription_signal
    name: "Subscription Signal"
    prompt: "Analyze the subscription tier data. Which plans exist, what are their prices, and which are most popular? Do users on different plan types show different engagement patterns or outcomes? Is the no-win-no-fee plan (is_no_win_no_fee=true) driving most conversions? What does the plan selection distribution look like?"

  - id: message_content_patterns
    name: "Message Content Patterns"
    prompt: "Investigate the JSONB message structure in session_messages. What keys exist in the message JSON? What is the average message length? Do users who write longer messages convert at higher rates? Are there structural differences in messages from users who convert vs those who don't? Look at message JSON keys and patterns."

  # === TIER 4: STRETCH (Lenses 13-15) ===
  # Advanced analyses that may yield surprising insights

  - id: email_activation
    name: "Email Activation"
    prompt: "Analyze the email/legal correspondence pipeline. How many users reach the 'first letter sent' stage? What is the time gap between agreement signing and first letter? Do users with inbound emails (is_inbound=true) have different outcomes? Is email activity volume correlated with reaching settlement?"

  - id: document_commitment
    name: "Document Commitment"
    prompt: "Analyze commitment signals: ID verification (is_id_deferred), terms acceptance (is_terms_accepted), marketing opt-in (is_marketing_accepted), document uploads (users_media). Which combination of commitment signals best predicts conversion? Do users who upload documents convert at higher rates?"

  - id: sentiment_trajectory
    name: "Sentiment Trajectory"
    prompt: "Use message metadata as engagement proxies since we can't run NLP. Analyze: message length variance across a session, time between messages (hesitation patterns), number of questions (question mark frequency in JSONB message content). Do sessions with increasing message length indicate growing engagement? What about sessions where users slow down?"
