id: obsidian-notes-validator
name: Obsidian Notes Validator
version: "2.0.0"
category: pattern
layer: 3

description: |
  Validates Obsidian markdown notes for common issues before finalizing.
  Checks Mermaid diagrams, math delimiters, notation callouts, TikZ blocks,
  frontmatter, wiki-links, and formatting.

  **Critical for Codex-generated notes** тАФ LLM coding agents consistently produce
  broken Obsidian syntax (wrong math delimiters, Mermaid parse errors, malformed
  notation callouts). Run this as the FINAL step after any agent creates notes.

triggers:
  - validate notes
  - check obsidian
  - fix mermaid
  - validate diagrams
  - final check
  - fix math delimiters
  - fix notation

owns:
  - mermaid validation
  - tikz validation
  - obsidian formatting
  - wiki-link checking
  - math delimiter validation
  - notation callout validation

